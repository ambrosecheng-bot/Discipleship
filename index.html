<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>與主同行 · 尋寶之旅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#e8d2a0;
  --paper-hi:#f5e8c2;
  --paper-lo:#d3ae68;
  --ink:#3f2c12;
  --ink-soft:#6d522b;
  --ink-faint:#9a7b46;
  --ochre:#bd8e38;
  --ochre-dk:#9a6f24;
  --seal:#a23527;
  --seal-dark:#722017;
  --line:rgba(122,90,46,.28);
  --shadow:rgba(55,35,10,.28);
  --serif:'Noto Serif TC',serif;
  --sans:'Noto Sans TC',sans-serif;
  --display:'Cinzel',serif;
  --nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);color:var(--ink);background:var(--paper);
  font-weight:300;line-height:1.85;-webkit-font-smoothing:antialiased;
}
::selection{background:var(--seal);color:#fff7df}
a{color:inherit;text-decoration:none}

/* ambient parchment background */
.bg{
  position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(circle at 22% 18%, rgba(122,90,46,.10), transparent 30%),
    radial-gradient(circle at 84% 72%, rgba(122,90,46,.12), transparent 32%),
    radial-gradient(circle at 50% 50%, transparent 55%, rgba(47,33,12,.28)),
    var(--paper);
}
.bg svg{position:absolute;inset:0;width:100%;height:100%}

/* ---------------- NAV ---------------- */
.nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:40;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:0 clamp(1rem,3vw,2rem);
  background:rgba(245,232,194,.86);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.brand{font-family:var(--serif);font-weight:700;font-size:1.15rem;letter-spacing:.08em;color:var(--ink);white-space:nowrap}
.brand span{display:block;font-family:var(--display);font-size:.52rem;letter-spacing:.26em;color:var(--seal);font-weight:600;margin-top:1px}
.nav-links{display:flex;align-items:center;gap:.5rem}
.nav-links>a{font-size:.86rem;color:var(--ink-soft);padding:.3rem .5rem;border-radius:4px;transition:color .2s}
.nav-links>a:hover{color:var(--seal)}
.nav-links>a.active{color:var(--seal);font-weight:500}
.pills{display:flex;gap:.32rem}
.pill{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:600;font-size:.74rem;color:var(--ink-soft);
  border:1px solid var(--line);transition:all .2s;
}
.pill:hover{border-color:var(--ochre);color:var(--ink)}
.pill.active{background:var(--seal);color:#fff7df;border-color:var(--seal)}
.menu-btn{
  display:none;background:none;border:1px solid var(--line);color:var(--ink);
  font-size:1.2rem;width:40px;height:38px;border-radius:6px;cursor:pointer;
}

/* mobile menu overlay */
.menu{
  position:fixed;inset:0;z-index:50;background:rgba(232,210,160,.97);
  backdrop-filter:blur(4px);
  display:flex;flex-direction:column;padding:calc(var(--nav-h) + 1rem) clamp(1.2rem,5vw,2.4rem) 2rem;
  gap:.2rem;opacity:0;pointer-events:none;transition:opacity .25s ease;overflow-y:auto;
}
.menu.open{opacity:1;pointer-events:auto}
.menu .close{position:absolute;top:14px;right:18px;font-size:1.6rem;background:none;border:none;color:var(--ink);cursor:pointer}
.menu .m-eyebrow{font-family:var(--display);font-size:.62rem;letter-spacing:.3em;color:var(--seal);margin:.4rem 0 .8rem}
.menu a{
  display:flex;align-items:center;gap:.9rem;padding:.7rem .4rem;border-bottom:1px solid var(--line);
  font-family:var(--serif);font-size:1.05rem;color:var(--ink);
}
.menu a .mn{font-family:var(--display);font-weight:600;color:var(--seal);width:1.6rem}
.menu a .me{margin-left:auto;font-family:var(--display);font-size:.66rem;letter-spacing:.1em;color:var(--ink-faint)}
.menu a.active{color:var(--seal)}

/* ---------------- VIEWS ---------------- */
.view{display:none;animation:viewin .5s ease}
.view.active{display:block}
@keyframes viewin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ---------------- HOME / HERO ---------------- */
.hero{
  position:relative;min-height:100svh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(1rem,3vw,1.6rem);padding:calc(var(--nav-h) + 1rem) clamp(1rem,3vw,2rem) 1.6rem;
}
.hero-map{position:relative;order:2;width:100%;height:auto;aspect-ratio:1200/760;display:block}
.hero-content{
  position:relative;z-index:3;order:1;width:min(92vw,560px);text-align:center;
  padding:clamp(1.5rem,4vw,2.4rem);
  background:linear-gradient(180deg, rgba(245,232,194,.95), rgba(232,210,160,.86));
  border:2px solid rgba(63,44,18,.6);
  box-shadow:0 0 0 5px rgba(245,232,194,.86),0 0 0 6px rgba(189,142,56,.78),0 20px 48px var(--shadow);
}
.hero-content::before,.hero-content::after{content:"";position:absolute;width:32px;height:32px;border:2px solid var(--ochre)}
.hero-content::before{top:10px;left:10px;border-right:0;border-bottom:0}
.hero-content::after{right:10px;bottom:10px;border-left:0;border-top:0}
.kicker{font-family:var(--display);font-weight:700;font-size:.7rem;letter-spacing:.32em;color:var(--seal);text-transform:uppercase;padding-left:.32em}
.flourish{width:92px;margin:.8rem auto .6rem;color:var(--ochre);display:block}
.hero h1{font-family:var(--serif);font-size:clamp(2.1rem,7vw,3.6rem);line-height:1.2;letter-spacing:.06em;color:var(--ink)}
.subtitle{margin:1rem auto 0;max-width:32rem;font-family:var(--serif);font-size:clamp(1rem,2.3vw,1.18rem);line-height:1.8;color:var(--ink-soft)}
.hero-actions{margin-top:1.5rem;display:flex;justify-content:center;gap:.8rem;flex-wrap:wrap}
.btn{appearance:none;border:0;display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:.76rem 1.3rem;border-radius:999px;font:700 .95rem/1 var(--sans);cursor:pointer;transition:transform .2s,background .2s,box-shadow .2s}
.btn-primary{background:var(--seal);color:#fff7df;box-shadow:0 10px 22px rgba(114,32,23,.26)}
.btn-secondary{background:rgba(245,232,194,.7);color:var(--ink);border:1px solid rgba(63,44,18,.4)}
.btn:hover{transform:translateY(-2px)}.btn-primary:hover{background:var(--seal-dark)}
.meta{margin-top:1.2rem;display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;color:var(--ink-soft);font-size:.88rem}
.meta span{background:rgba(255,249,226,.5);border:1px solid var(--line);padding:.4rem .7rem;border-radius:999px}
.pin{cursor:pointer}
.pin .disc{transition:transform .22s ease;transform-origin:center;transform-box:fill-box}
.pin:hover .disc{transform:scale(1.16)}
.route-line,.branch,.treasure,.map-label,.pin{opacity:0;animation:fade .75s ease forwards}
@keyframes fade{to{opacity:1}}

/* ---------------- STATION PAGE ---------------- */
.station-page{
  max-width:780px;margin:0 auto;
  padding:calc(var(--nav-h) + clamp(1.4rem,4vw,2.6rem)) clamp(1.1rem,4vw,1.8rem) clamp(3rem,6vw,5rem);
}
.sheet{
  position:relative;
  background:linear-gradient(180deg, rgba(245,232,194,.7), rgba(245,232,194,.4));
  border:1px solid var(--line);
  box-shadow:0 18px 44px var(--shadow);
  padding:clamp(1.8rem,5vw,3.2rem) clamp(1.4rem,5vw,3rem) clamp(2rem,5vw,3rem);
}
.sheet::before,.sheet::after{content:"";position:absolute;width:30px;height:30px;border:2px solid var(--ochre);opacity:.7}
.sheet::before{top:12px;left:12px;border-right:0;border-bottom:0}
.sheet::after{bottom:12px;right:12px;border-left:0;border-top:0}

.st-banner{display:block;margin:0 0 1.5rem;border-radius:6px;overflow:hidden;border:1px solid var(--line);box-shadow:0 12px 30px var(--shadow);background:var(--paper-hi)}
.st-banner img{display:block;width:100%;height:auto}
.st-progress{display:flex;align-items:center;gap:.7rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.4rem}
.st-progress .pe{font-family:var(--display);font-size:.62rem;letter-spacing:.28em;color:var(--seal);text-transform:uppercase}
.dots{display:flex;gap:.34rem}
.dots i{width:7px;height:7px;border-radius:50%;background:var(--line);display:block}
.dots i.on{background:var(--seal)}
.dots i.done{background:var(--ochre)}

.seal{
  width:74px;height:74px;border-radius:50%;margin:0 auto 1rem;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 38% 32%, #c2473a, var(--seal) 60%, var(--seal-dark));
  color:#fff7df;font-family:var(--display);font-weight:700;font-size:1.7rem;
  box-shadow:0 6px 16px rgba(114,32,23,.34), inset 0 2px 6px rgba(255,255,255,.22), inset 0 -3px 8px rgba(0,0,0,.25);
  border:2px solid rgba(255,247,223,.35);
}
.st-eyebrow{text-align:center;font-family:var(--display);font-size:.66rem;letter-spacing:.26em;color:var(--ink-faint);text-transform:uppercase}
.st-title{text-align:center;font-family:var(--serif);font-weight:700;font-size:clamp(2rem,6vw,3rem);letter-spacing:.08em;color:var(--ink);margin-top:.5rem}
.st-en{text-align:center;font-family:var(--display);font-size:.8rem;letter-spacing:.16em;color:var(--seal);margin-top:.5rem}
.st-rule{display:flex;align-items:center;justify-content:center;gap:.7rem;margin:1.3rem 0}
.st-rule .ln{height:1px;width:54px;background:var(--ochre);opacity:.6}
.st-rule .dia{width:7px;height:7px;background:var(--ochre);transform:rotate(45deg)}
.st-lead{text-align:center;font-family:var(--serif);font-size:1.16rem;line-height:1.8;color:var(--ink-soft);max-width:34rem;margin:0 auto}

/* transformation flow */
.flow{margin:2.2rem auto 0;max-width:36rem;display:flex;flex-direction:column;align-items:center;gap:0}
.step{width:100%;padding:1rem 1.2rem;border-radius:4px;text-align:center}
.step .lab{font-family:var(--display);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;display:block;margin-bottom:.3rem}
.step.from{background:rgba(122,90,46,.08);border:1px solid var(--line)}
.step.from .lab{color:var(--ink-faint)}
.step.from p{color:var(--ink-soft);font-family:var(--serif)}
.step.means{background:linear-gradient(180deg,rgba(189,142,56,.2),rgba(189,142,56,.1));border:1px solid var(--ochre);border-left-width:3px}
.step.means .lab{color:var(--ochre-dk)}
.step.means p{color:var(--ink);font-family:var(--serif);font-weight:500}
.step.to{background:rgba(162,53,39,.1);border:1px solid rgba(162,53,39,.4)}
.step.to .lab{color:var(--seal)}
.step.to p{color:var(--ink);font-family:var(--serif);font-weight:500}
.arrow{color:var(--ochre);font-size:1.2rem;line-height:1;padding:.45rem 0}

.scripture{
  margin:2.2rem auto 0;max-width:36rem;position:relative;
  padding:1.3rem 1.5rem 1.3rem 1.7rem;
  background:rgba(255,249,226,.5);border-left:3px solid var(--seal);border-radius:0 4px 4px 0;
}
.scripture .ref{font-family:var(--display);font-size:.72rem;letter-spacing:.16em;color:var(--seal);display:block;margin-bottom:.4rem}
.scripture .verse{font-family:var(--serif);font-size:1.12rem;line-height:1.75;color:var(--ink)}

.why{margin:1.8rem auto 0;max-width:36rem;color:var(--ink-soft);font-size:.98rem;line-height:1.8;text-align:center}
.why b{font-family:var(--serif);color:var(--seal);font-weight:600;margin-right:.4rem}

/* dual-track essay (station 1) */
.essay{max-width:40rem;margin:2.6rem auto 0;padding-top:2rem;border-top:1px solid var(--line)}
.essay-eyebrow{display:block;text-align:center;font-family:var(--display);font-size:.62rem;letter-spacing:.28em;color:var(--seal);text-transform:uppercase}
.essay h3{text-align:center;font-family:var(--serif);font-weight:700;font-size:1.5rem;letter-spacing:.05em;color:var(--ink);margin:.5rem 0 1.1rem}
.essay-intro{font-family:var(--serif);font-size:1.06rem;line-height:1.95;color:var(--ink);text-align:center;margin-bottom:.6rem}
.theme{margin-top:2rem}
.theme-title{display:flex;align-items:center;gap:.6rem;font-family:var(--serif);font-weight:700;font-size:1.18rem;color:var(--ink);letter-spacing:.06em;margin-bottom:.7rem}
.theme-title .tn{width:1.9rem;height:1.9rem;flex:none;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--seal);color:#fff7df;font-family:var(--display);font-size:.9rem;font-weight:700}
.track{padding:.2rem 0 .2rem 1rem;border-left:2px solid var(--ochre);margin-bottom:.7rem}
.track.b{border-left-color:var(--seal);background:rgba(162,53,39,.05);border-radius:0 4px 4px 0;padding:.7rem 1rem}
.track .tk{display:block;font-family:var(--display);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.3rem}
.track.a .tk{color:var(--ochre-dk)}
.track.b .tk{color:var(--seal)}
.track p{font-family:var(--serif);font-size:1rem;line-height:1.9;color:var(--ink)}
.track p .gk{font-style:italic;color:var(--ink-soft)}
.essay-box{margin-top:2rem;padding:1.2rem 1.4rem;border:1px solid var(--ochre);border-radius:5px;background:rgba(189,142,56,.08)}
.essay-box.apply{border-color:var(--line);background:rgba(255,249,226,.5)}
.essay-box .tk{display:block;font-family:var(--display);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--seal);margin-bottom:.45rem}
.essay-box p{font-family:var(--serif);font-size:1rem;line-height:1.9;color:var(--ink)}

/* actionable block (station 1) */
.action{max-width:40rem;margin:2.4rem auto 0;padding-top:2rem;border-top:1px solid var(--line)}
.action-eyebrow{display:block;text-align:center;font-family:var(--display);font-size:.62rem;letter-spacing:.26em;color:var(--seal);text-transform:uppercase}
.action h3{text-align:center;font-family:var(--serif);font-weight:700;font-size:1.4rem;letter-spacing:.05em;color:var(--ink);margin:.5rem 0 1.3rem}
.act{border:1px solid var(--line);border-left:3px solid var(--ochre);border-radius:0 5px 5px 0;background:rgba(255,249,226,.5);padding:1.1rem 1.3rem;margin-bottom:1rem}
.act .num{display:inline-flex;align-items:center;justify-content:center;width:1.7rem;height:1.7rem;border-radius:50%;background:var(--seal);color:#fff7df;font-family:var(--display);font-weight:700;font-size:.82rem;margin-right:.55rem;vertical-align:middle}
.act .h{font-family:var(--serif);font-weight:700;font-size:1.1rem;color:var(--ink);letter-spacing:.04em;vertical-align:middle}
.act .en{font-family:var(--display);font-size:.58rem;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;margin-left:.5rem}
.act .lead{font-family:var(--serif);font-size:1.04rem;line-height:1.85;color:var(--ink);margin:.7rem 0 0}
.act .note{font-size:.88rem;color:var(--ink-soft);line-height:1.75;margin-top:.6rem}
.act .pray{font-family:var(--serif);font-style:italic;color:var(--seal);margin-top:.7rem;line-height:1.7}
.act ul{margin:.7rem 0 0;padding-left:1.15rem}
.act li{font-family:var(--serif);font-size:1rem;line-height:1.8;color:var(--ink);margin-bottom:.5rem}
.act textarea{width:100%;margin-top:.75rem;min-height:5.4rem;resize:vertical;background:rgba(255,253,245,.85);border:1px solid var(--line);border-radius:5px;padding:.7rem .85rem;font-family:var(--serif);font-size:.98rem;color:var(--ink);line-height:1.75}
.act textarea:focus{outline:none;border-color:var(--ochre)}
.act .micro{display:block;font-size:.78rem;color:var(--ink-faint);margin-top:.45rem;line-height:1.65}
.act.guard{border-left-color:var(--seal);background:rgba(162,53,39,.06)}
.act.guard .h{color:var(--seal)}

/* page nav */
.page-nav{margin:2.6rem auto 0;max-width:40rem;display:grid;grid-template-columns:1fr auto 1fr;gap:.8rem;align-items:stretch}
.pn{display:flex;flex-direction:column;justify-content:center;padding:.85rem 1.1rem;border:1px solid var(--line);border-radius:6px;background:rgba(255,249,226,.4);transition:border-color .2s,transform .2s;min-height:62px}
.pn:hover{border-color:var(--ochre);transform:translateY(-2px)}
.pn .pn-k{font-family:var(--display);font-size:.58rem;letter-spacing:.16em;color:var(--ink-faint);text-transform:uppercase}
.pn .pn-t{font-family:var(--serif);font-weight:600;color:var(--ink);font-size:1rem;margin-top:.2rem}
.pn.next{text-align:right}
.pn.map{align-items:center;justify-content:center;background:var(--seal);border-color:var(--seal);color:#fff7df;font-family:var(--serif);font-weight:600;padding:.85rem 1rem}
.pn.map:hover{background:var(--seal-dark)}
.pn.disabled{opacity:.4;pointer-events:none}

@media (min-width:760px){
  .hero{display:block}
  .hero-map{position:absolute;inset:0;order:0;width:100%;height:100%;aspect-ratio:auto}
  .hero-content{position:absolute;left:50%;top:calc(var(--nav-h) + clamp(1.4rem,4vw,2.6rem));transform:translateX(-50%);width:min(78vw,640px)}
}
@media (max-width:759px){
  .nav-links{display:none}
  .menu-btn{display:block}
  .subtitle br{display:none}
  .meta{display:none}
}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  .view,.route-line,.branch,.treasure,.map-label,.pin{animation:none;opacity:1}
  .pin .disc,.btn,.pn{transition:none}
}
</style>
</head>
<body>
<div class="bg">
  <svg xmlns="http://www.w3.org/2000/svg"><defs>
    <filter id="bgGrain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer></filter>
  </defs><rect width="100%" height="100%" filter="url(#bgGrain)" opacity="0.5"/></svg>
</div>

<nav class="nav">
  <a class="brand" href="#home">與主同行<span>The Disciple&rsquo;s Map</span></a>
  <div class="nav-links">
    <a href="#home" data-route="#home">首頁</a>
    <span class="pills" id="navPills"></span>
  </div>
  <button class="menu-btn" id="menuBtn" aria-label="開啟選單" aria-expanded="false">☰</button>
</nav>

<div class="menu" id="menu" aria-hidden="true">
  <button class="close" id="menuClose" aria-label="關閉選單">&times;</button>
  <div class="m-eyebrow">The Disciple&rsquo;s Map · 九站旅程</div>
  <a href="#home"><span class="mn">⌂</span><span>首頁 · 尋寶地圖</span><span class="me">MAP</span></a>
  <div id="menuStations"></div>
</div>

<main>
  <!-- HOME -->
  <section id="home" class="view active">
    <div class="hero">
      <svg class="hero-map" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid slice" role="img" aria-label="羊皮紙藏寶地圖，九站門徒旅程路線通往至寶">
        <defs>
          <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
            <stop offset="55%" stop-color="#000" stop-opacity="0"/>
            <stop offset="100%" stop-color="#2f210c" stop-opacity=".44"/>
          </radialGradient>
          <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
            <feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.065"/></feComponentTransfer>
            <feComposite operator="over" in2="SourceGraphic"/></filter>
          <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="8" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/></filter>
        </defs>
        <rect width="1200" height="760" fill="#e8d2a0"/>
        <rect width="1200" height="760" fill="#e8d2a0" filter="url(#grain)"/>
        <circle cx="170" cy="170" r="150" fill="#7a5a2e" opacity=".10"/>
        <circle cx="1010" cy="570" r="190" fill="#7a5a2e" opacity=".11"/>
        <circle cx="650" cy="700" r="125" fill="#7a5a2e" opacity=".08"/>
        <g stroke="#7a5a2e" stroke-opacity=".13" stroke-width="1">
          <line x1="240" y1="20" x2="240" y2="740"/><line x1="480" y1="20" x2="480" y2="740"/>
          <line x1="720" y1="20" x2="720" y2="740"/><line x1="960" y1="20" x2="960" y2="740"/>
          <line x1="20" y1="190" x2="1180" y2="190"/><line x1="20" y1="380" x2="1180" y2="380"/>

    <h3>路上相遇 · 友善之關係</h3>

      <div class="track b"><span class="tk">在英港人怎樣走</span><p>對港人，飯桌同樣是最短的橋。一頓茶餐廳早餐、一鍋打邊爐、教會的中秋與新年聚餐，比任何單張都更快讓一個剛到埠、人生路不熟的家庭感到「我並不孤單」。彼此連結，往往就由一句「得閒一齊食餐飯」開始——這正是利未筵席的當代版本。</p></div>

const container=document.getElementById("stationsContainer");
const total=STATIONS.length;
STATIONS.forEach(s=>{
  const ph=PHASES[s.phase];
  const prev=STATIONS.find(x=>x.n===s.n-1);
  const next=STATIONS.find(x=>x.n===s.n+1);
  let dots="";
  STATIONS.forEach(x=>{dots+=`<i class="${x.n===s.n?'on':(x.n<s.n?'done':'')}"></i>`;});
  const prevHtml = prev
    ? `<a class="pn prev" href="#st-${prev.n}"><span class="pn-k">← 上一站 · 第 ${prev.n} 站</span><span class="pn-t">${prev.title}</span></a>`
    : `<a class="pn prev" href="#home"><span class="pn-k">← 回首頁</span><span class="pn-t">尋寶地圖</span></a>`;
  const nextHtml = next
    ? `<a class="pn next" href="#st-${next.n}"><span class="pn-k">下一站 · 第 ${next.n} 站 →</span><span class="pn-t">${next.title}</span></a>`
    : `<a class="pn next" href="#home"><span class="pn-k">旅程的循環 →</span><span class="pn-t">再從「初遇」開始</span></a>`;

  const sec=document.createElement("section");
  sec.className="view";
  sec.id="st-"+s.n;
  sec.innerHTML=`
    <div class="station-page">
      <div class="sheet">
        ${s.n===1 ? BANNER_ST1 : ""}
        <div class="st-progress">
          <span class="pe">${ph.en} · ${ph.zh}</span>
          <span class="dots">${dots}</span>
          <span class="pe">第 ${s.n} 站 / 共 ${total} 站</span>
        </div>
        <div class="seal">${s.n}</div>
        <div class="st-eyebrow">第 ${s.n} 站 · ${s.name}</div>
        <h2 class="st-title">${s.title}</h2>
        <div class="st-en">${s.en}</div>
        <div class="st-rule"><span class="ln"></span><span class="dia"></span><span class="ln"></span></div>
        <p class="st-lead">${s.one}</p>

        <div class="flow">
          <div class="step from"><span class="lab">從 · From</span><p>${s.from}</p></div>
          <div class="arrow">↓</div>
          <div class="step means"><span class="lab">恩典管道 · Means of Grace</span><p>${s.means}</p></div>
          <div class="arrow">↓</div>
          <div class="step to"><span class="lab">到 · To</span><p>${s.to}</p></div>
        </div>

        <div class="scripture">
          <span class="ref">${s.ref}</span>
          <span class="verse">${s.verse}</span>
        </div>

        <p class="why"><b>為何</b>${s.why}</p>
        ${s.n===1 ? ESSAY_ST1 : ""}
        ${s.n===1 ? ACTION_ST1 : ""}

        <div class="page-nav">
          ${prevHtml}
          <a class="pn map" href="#home">回到<br>地圖</a>
          ${nextHtml}
        </div>
      </div>
    </div>`;
  container.appendChild(sec);
});

/* ---------------- NAV BUILD ---------------- */
const navPills=document.getElementById("navPills");
const menuStations=document.getElementById("menuStations");
STATIONS.forEach(s=>{
  const p=document.createElement("a");
  p.className="pill";p.href="#st-"+s.n;p.textContent=s.n;p.dataset.route="#st-"+s.n;
  p.setAttribute("aria-label",`第 ${s.n} 站：${s.title}`);
  navPills.appendChild(p);
  const m=document.createElement("a");
  m.href="#st-"+s.n;m.dataset.route="#st-"+s.n;
  m.innerHTML=`<span class="mn">${s.n}</span><span>${s.title}</span><span class="me">${s.en}</span>`;
  menuStations.appendChild(m);
});

/* ---------------- ROUTER (click-intercepting; safe inside sandboxed iframes) ---------------- */
const views=[...document.querySelectorAll(".view")];
const menu=document.getElementById("menu");
function closeMenu(){menu.classList.remove("open");menu.setAttribute("aria-hidden","true");
  document.getElementById("menuBtn").setAttribute("aria-expanded","false");}
function showView(id){
  if(!id || !document.getElementById(id)) id="home";
  views.forEach(v=>v.classList.toggle("active",v.id===id));
  document.querySelectorAll("[data-route]").forEach(a=>a.classList.toggle("active",a.dataset.route==="#"+id));
  closeMenu();
  window.scrollTo({top:0,behavior:"auto"});
  try{history.replaceState(null,"","#"+id);}catch(e){/* sandbox may block; ignore */}
}
/* intercept in-page hash links (HTML and SVG <a>) so the iframe never tries to navigate */
document.addEventListener("click",function(e){
  const a=e.target.closest ? e.target.closest("a") : null;
  if(!a) return;
  const href=a.getAttribute("href")||"";
  if(href.charAt(0)!=="#") return;
  e.preventDefault();
  showView(href.slice(1));
});
/* support direct URL hash + browser back/forward on real hosting */
window.addEventListener("hashchange",()=>showView((location.hash||"#home").slice(1)));
/* initial view */
showView((location.hash||"#home").slice(1));

/* menu toggles */
document.getElementById("menuBtn").addEventListener("click",()=>{
  const open=!menu.classList.contains("open");
  menu.classList.toggle("open",open);menu.setAttribute("aria-hidden",open?"false":"true");
  document.getElementById("menuBtn").setAttribute("aria-expanded",open?"true":"false");
});
document.getElementById("menuClose").addEventListener("click",closeMenu);
document.getElementById("openMenu").addEventListener("click",()=>{
  menu.classList.add("open");menu.setAttribute("aria-hidden","false");
});
</script>
</body>
